version: '3.8'

services:
  barcode-detector:
    build:
      context: .
      dockerfile: Dockerfile
    image: barcode-detector:latest
    container_name: barcode-detector
    runtime: nvidia
    privileged: true
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - PLATFORM_OVERRIDE=jetson
      - GST_DEBUG=1
    volumes:
      - .:/app
      - /tmp/argus_socket:/tmp/argus_socket
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
      - ./reports:/app/reports
    devices:
      - /dev/video0:/dev/video0
    stdin_open: true
    tty: true
